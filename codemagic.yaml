workflows:
  ios-release:
    name: iOS Build — PEF
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (unsigned)
        script: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/PEF.ipa Payload
          cd ../../..

    artifacts:
      - build/ios/ipa/PEF.ipa

  android-release:
    name: Android Build — PEF
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
